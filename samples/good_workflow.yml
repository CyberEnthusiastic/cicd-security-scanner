name: Secure Workflow

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@04b98b3f9e85f563fb061be8751a0352327246b0
        with:
          role-to-assume: arn:aws:iam::111122223333:role/ci-role
          aws-region: us-east-1

      - name: Secret scan
        uses: gitleaks/gitleaks-action@44c470ffc35caa8b1eb1e8273bd48e4fc6ed7fb3

      - name: Run SAST
        run: semgrep ci --config auto
